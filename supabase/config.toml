# ============================================================================
# Supabase CLI config for the Abhinaya Cinemas project.
#
# This file lets `supabase` CLI commands know which schema, migrations folder,
# and Postgres version to target. The actual project (staging vs prod) is
# selected at runtime with `supabase link --project-ref <ref>`.
#
# Project refs:
#   staging  →  lctkvmpzijaspaytunkm
#   prod     →  xkmjygegtpmmwwnyoufn
#
# Anon keys + service-role keys are NOT in this file. Use
# `supabase secrets set` for Edge Functions, and your .env.local for local
# scripts. Service role key lives only in Supabase secrets, never in git.
# ============================================================================

# `project_id` is used by `supabase start` for the local Docker stack. We
# don't run locally yet, but the CLI requires the field to be present.
project_id = "abhinaya-cinemas"

[db]
# Match the Postgres major version of your Supabase project. As of mid-2026
# Supabase provisions Postgres 15; bump this if you upgrade.
major_version = 15

[db.migrations]
# Where migration files live. CLI scans this folder when running
# `supabase db push` / `supabase db reset`.
schema_paths = ["./migrations"]

[functions]
# Edge Functions live under supabase/functions/<name>/index.ts. The CLI
# deploys them with `supabase functions deploy <name>`.
verify_jwt = true
