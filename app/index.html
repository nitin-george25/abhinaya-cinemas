<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F1115" />
    <title>Abhinaya Cinemas · Console</title>
    <!-- Malayalam UI font (bilingual SOP checklists). Anek Malayalam pairs
         with Barlow Semi Condensed and renders for every user — no install. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-paper text-ink antialiased">
    <div id="root"></div>
    <!--
      Paths in index.html are relative to the Vite project root, NOT to the
      deployed site. Vite applies the `base` ('/v2/') prefix during build,
      rewriting this to /v2/assets/main-<hash>.js in the production HTML.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
